# starship.toml (fast "macOS dev bro")
# Put at: ~/.config/starship.toml

add_newline = false
continuation_prompt = "[▸▹ ](dimmed white)"

# One clean line, no right prompt (right prompt tends to be heavier/noisier)
format = "$directory$git_branch$git_status$cmd_duration$character"
right_format = ""

[character]
format = "$symbol "
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold cyan)"

[directory]
home_symbol = "⌂"
truncation_length = 3
truncate_to_repo = true
read_only = " "
use_os_path_sep = true
style = "bold cyan"
format = "[$path]($style)[$read_only](bold red) "

[cmd_duration]
min_time = 700
format = "[took $duration](dimmed white) "

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = "([$all_status$ahead_behind]($style) )"
# Keep it readable
conflicted = "✖"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "*"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# --- hard disable noisy/heavy stuff ---
[aws]
disabled = true
[gcloud]
disabled = true
[azure]
disabled = true
[kubernetes]
disabled = true
[docker_context]
disabled = true
[singularity]
disabled = true
[openstack]
disabled = true

[hostname]
disabled = true
[localip]
disabled = true
[shlvl]
disabled = true
[shell]
disabled = true
[env_var]
disabled = true
[jobs]
disabled = true
[sudo]
disabled = true
[username]
disabled = true
[time]
disabled = true
[battery]
disabled = true
[memory_usage]
disabled = true
[package]
disabled = true
[nix_shell]
disabled = true
[container]
disabled = true
[status]
disabled = true

# Languages: show only when in a real project (fast + clean)
[nodejs]
disabled = false
format = "[node $version](dimmed green) "
detect_files = ["package.json", "package-lock.json", "yarn.lock", "pnpm-lock.yaml"]
detect_folders = ["node_modules"]

[python]
disabled = false
format = "[py $version](dimmed yellow) "
detect_files = ["pyproject.toml", "requirements.txt", "Pipfile", "poetry.lock"]
detect_extensions = ["py"]

[rust]
disabled = false
format = "[rs $version](dimmed red) "
detect_files = ["Cargo.toml"]

[swift]
disabled = false
format = "[sw $version](dimmed red) "
detect_files = ["Package.swift"]
