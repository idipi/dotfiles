# ~/.config/starship.toml
add_newline = false
continuation_prompt = "[▸▹ ](dimmed white)"
format = "$directory$git_branch$git_status$terraform$kubernetes$helm$cmd_duration$character"
right_format = ""

[character]
format = "$symbol "
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold cyan)"

[directory]
home_symbol = "⌂"
truncation_length = 3
truncate_to_repo = true
read_only = " "
style = "bold cyan"
format = "[$path]($style)[$read_only](bold red) "

[cmd_duration]
min_time = 700
format = "[took $duration](dimmed white) "

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "✖"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "*"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[terraform]
disabled = false
symbol = "tf"
format = "[$symbol $workspace](bold blue) "
detect_files = ["*.tf", "*.tfvars"]
detect_folders = [".terraform"]

[kubernetes]
disabled = false
symbol = "k8s"
format = "[$symbol $context(/$namespace)](bold cyan) "
detect_files = ["kustomization.yaml", "kustomization.yml"]
detect_folders = ["k8s", "manifests", "helm"]

[helm]
disabled = false
symbol = "helm"
format = "[$symbol $version](dimmed cyan) "

# --- everything else off ---
